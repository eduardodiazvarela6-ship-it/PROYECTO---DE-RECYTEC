<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RECYTEC | Boletas HOiN</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #eef2f1; }
    .wrap { max-width: 360px; margin: 1rem auto; background: #fff; border-radius: 12px; padding: 1rem; }
    .ticket {
      width: 58mm; margin: 0 auto; background: #fff; color: #000; padding: 2mm;
      border: 1px dashed #bbb; font-size: 11px;
    }
    input, textarea, button { width: 100%; margin-bottom: .55rem; padding: .55rem; box-sizing: border-box; }
    table { width: 100%; font-size: 10px; border-collapse: collapse; }
    td { padding: 2px 0; }
    .center { text-align: center; }
    .right { text-align: right; }
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .ticket { border: 0; width: 58mm; }
    }
  </style>
</head>
<body>
  <div class="wrap no-print">
    <h2>Boletas HOiN (POS-58)</h2>
    <input id="empresa" value="RECYTEC" placeholder="Empresa" />
    <input id="ruc" placeholder="RUC" />
    <input id="cliente" placeholder="Cliente" />
    <textarea id="detalle" placeholder="Detalle (ej. Chatarra ferrosa x 10kg)"></textarea>
    <input id="monto" type="number" step="0.01" placeholder="Monto total" />
    <button onclick="generar()">Generar boleta</button>
    <button onclick="window.print()">Imprimir</button>
    <button onclick="location.href='index.html'">Volver al dashboard</button>
  </div>

  <section class="ticket" id="ticket">
    <div class="center"><strong>RECYTEC</strong><br><span>BOLETA</span></div>
    <hr>
    <div>Fecha: <span id="tFecha"></span></div>
    <div>Cliente: <span id="tCliente">-</span></div>
    <div>RUC: <span id="tRuc">-</span></div>
    <table>
      <tr><td>Detalle</td><td class="right" id="tDetalle">-</td></tr>
      <tr><td><strong>Total</strong></td><td class="right"><strong id="tTotal">S/ 0.00</strong></td></tr>
    </table>
    <hr>
    <p class="center">Gracias por su preferencia</p>
  </section>

  <script>
    function generar() {
      const hoy = new Date().toLocaleString('es-PE');
      document.getElementById('tFecha').textContent = hoy;
      document.getElementById('tCliente').textContent = document.getElementById('cliente').value || '-';
      document.getElementById('tRuc').textContent = document.getElementById('ruc').value || '-';
      document.getElementById('tDetalle').textContent = (document.getElementById('detalle').value || '-').slice(0, 48);
      document.getElementById('tTotal').textContent = `S/ ${Number(document.getElementById('monto').value || 0).toFixed(2)}`;
      const nombre = document.getElementById('empresa').value || 'RECYTEC';
      document.querySelector('.ticket strong').textContent = nombre;
    }
    generar();
  </script>
</body>
</html>
